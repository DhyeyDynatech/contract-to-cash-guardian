# Microsoft 365 Agents Toolkit lifecycle config for the Contract-to-Cash Guardian
# CUSTOM ENGINE AGENT (bot) — "dev" environment. Packages appPackage/manifest.json
# (the CEA manifest: bots + copilotAgents.customEngineAgents) and sideloads it into
# your tenant so it appears in Microsoft 365 Copilot Chat.
# For the local dev-tunnel development flow, see m365agents.local.yml.
# Run via the Agents Toolkit panel in VS Code (Provision), or `atk provision`.
# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.7/yaml.schema.json
version: v1.7

provision:
  # Create or reuse the Teams/Copilot app registration
  - uses: teamsApp/create
    with:
      name: C2C-Guardian-${{TEAMSFX_ENV}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Validate the app package against the manifest schema
  - uses: teamsApp/validateManifest
    with:
      manifestPath: ./appPackage/manifest.json

  # Zip the app package (the CEA manifest.json + icons)
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  # Validate the built zip
  - uses: teamsApp/validateAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

  # Update / sideload into your tenant so it appears in Copilot Chat
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

projectId: c2c-guardian-0001
