# Microsoft 365 Agents Toolkit - LOCAL (dev tunnel) provisioning for the
# Contract-to-Cash Guardian CUSTOM ENGINE AGENT. Run via the Toolkit's
# "Start App Locally": starts a dev tunnel -> provisions an Entra app + Azure
# Bot registration pointed at the tunnel -> sideloads + extends to Microsoft 365
# Copilot -> writes connected auth to .localConfigs -> the bot is started by a task.
# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.11/yaml.schema.json
version: v1.11

provision:
  # Create (or reuse) the Teams/Copilot app registration
  - uses: teamsApp/create
    with:
      name: C2C-Guardian-${{APP_NAME_SUFFIX}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # NOTE: aadApp/create is intentionally omitted — this tenant blocks creating
  # Entra apps. Instead, BOT_ID (client id) and SECRET_BOT_PASSWORD (secret) are
  # supplied manually from an app registration created in the Entra portal:
  #   BOT_ID            -> env/.env.local
  #   SECRET_BOT_PASSWORD -> env/.env.local.user

  # NOTE: botFramework/create is intentionally omitted — this tenant blocks the
  # Developer Portal bot-creation API. The bot is registered as an AZURE BOT
  # resource in the Azure portal instead (same BOT_ID app, messaging endpoint =
  # the dev tunnel + /api/messages, Microsoft Teams channel enabled).

  # Build, validate, sideload, and extend the app package to Microsoft 365 Copilot
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  - uses: teamsApp/validateAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
  - uses: teamsApp/extendToM365
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      titleId: M365_TITLE_ID
      appId: M365_APP_ID

deploy:
  # Write the bot's connected (client-secret) auth to .localConfigs, which the
  # bot loads on top of .env. This switches the SERVICE_CONNECTION from local
  # anonymous mode to authenticated mode so Azure Bot Service can reach it.
  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.localConfigs
      envs:
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__ANONYMOUS_ALLOWED: "false"
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__AUTHTYPE: ClientSecret
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTID: ${{BOT_ID}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTSECRET: ${{SECRET_BOT_PASSWORD}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__TENANTID: ${{TEAMS_APP_TENANT_ID}}
